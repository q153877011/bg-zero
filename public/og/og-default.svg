<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0B0F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#18171c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Diamond logo -->
  <g transform="translate(600, 240)">
    <path d="M0 -60 L60 0 L0 60 L-60 0 Z" fill="white" fill-opacity="0.12"/>
    <path d="M0 -35 L35 0 L0 35 L-35 0 Z" fill="white" fill-opacity="0.30"/>
    <circle cx="0" cy="0" r="16" fill="white" fill-opacity="0.95"/>
  </g>
  <!-- Brand -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f5f4f2" letter-spacing="-0.02em">
    <tspan font-weight="700">BG</tspan><tspan font-weight="300" fill-opacity="0.7">-Zero</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9a99a0">
    Free AI Background Remover · 100% Local &amp; Private
  </text>
  <!-- Features -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#5a5960">
    3 AI Engines · No Upload · No Watermark · Browser-Native
  </text>
  <!-- Accent bar -->
  <rect x="480" y="470" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
